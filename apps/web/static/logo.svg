<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="cmail">
  <title>cmail</title>
  <defs>
    <linearGradient id="cmailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="50%" stop-color="#2B88D8"/>
      <stop offset="100%" stop-color="#50E6FF"/>
    </linearGradient>
    <linearGradient id="cmailMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#106EBE"/>
    </linearGradient>
    <filter id="cmailShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mark: stylised envelope with C-cut -->
  <g transform="translate(20, 28)" filter="url(#cmailShadow)">
    <rect x="0" y="0" width="64" height="64" rx="12" fill="url(#cmailMark)"/>
    <path d="M14 24 L32 38 L50 24" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 24 L14 46 L50 46 L50 24" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="14" r="6" fill="#50E6FF"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(108, 78)" font-family="'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="300" font-size="56" letter-spacing="-2">
    <text x="0" y="0" fill="url(#cmailGrad)" filter="url(#cmailShadow)">cmail</text>
  </g>
</svg>
